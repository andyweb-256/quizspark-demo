<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="drop1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="drop2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="drop3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="none"/>

  <!-- Paint palette — bottom left foreground -->
  <g transform="translate(100, 780)" opacity="0.09" stroke="#a78bfa" fill="none">
    <path d="M-80,0 Q-90,-60 -40,-80 Q20,-90 60,-60 Q90,-30 80,20 Q60,50 0,50 Q-40,50 -50,30 Q-30,20 -20,0 Q-10,-20 0,-10" stroke-width="1"/>
    <!-- Color wells -->
    <circle cx="-50" cy="-40" r="10" fill="#a78bfa" opacity="0.2" stroke-width="0.6"/>
    <circle cx="-10" cy="-65" r="10" fill="#f472b6" opacity="0.2" stroke-width="0.6"/>
    <circle cx="35"  cy="-55" r="10" fill="#60b8ff" opacity="0.2" stroke-width="0.6"/>
    <circle cx="58"  cy="-20" r="10" fill="#34d399" opacity="0.2" stroke-width="0.6"/>
    <circle cx="45"  cy="20"  r="10" fill="#fbbf24" opacity="0.2" stroke-width="0.6"/>
    <!-- Thumb hole -->
    <circle cx="-30" cy="25" r="14" stroke-width="0.8"/>
  </g>

  <!-- Paint splatter drops — various sizes -->
  <g filter="url(#softblur)" opacity="0.12">
    <circle cx="500"  cy="160" r="8"  fill="#a78bfa"/>
    <circle cx="510"  cy="148" r="3"  fill="#a78bfa"/>
    <circle cx="492"  cy="172" r="4"  fill="#a78bfa"/>
    <circle cx="480"  cy="155" r="2"  fill="#a78bfa"/>
    <circle cx="840"  cy="380" r="10" fill="#f472b6"/>
    <circle cx="852"  cy="365" r="4"  fill="#f472b6"/>
    <circle cx="828"  cy="392" r="5"  fill="#f472b6"/>
    <circle cx="820"  cy="372" r="2"  fill="#f472b6"/>
    <circle cx="1180" cy="600" r="7"  fill="#c4b5fd"/>
    <circle cx="1190" cy="588" r="3"  fill="#c4b5fd"/>
    <circle cx="1170" cy="610" r="3"  fill="#c4b5fd"/>
    <circle cx="300"  cy="700" r="6"  fill="#a78bfa"/>
    <circle cx="310"  cy="690" r="2"  fill="#a78bfa"/>
    <circle cx="292"  cy="710" r="3"  fill="#a78bfa"/>
  </g>

  <!-- Bright foreground ink glow drops -->
  <g filter="url(#glow)">
    <ellipse cx="500"  cy="160" rx="5" ry="5" fill="url(#drop1)" opacity="0.4"/>
    <ellipse cx="840"  cy="380" rx="6" ry="6" fill="url(#drop2)" opacity="0.38"/>
    <ellipse cx="1180" cy="600" rx="4" ry="4" fill="url(#drop3)" opacity="0.35"/>
    <ellipse cx="300"  cy="700" rx="4" ry="4" fill="url(#drop1)" opacity="0.35"/>
    <ellipse cx="700"  cy="260" rx="5" ry="5" fill="url(#drop2)" opacity="0.32"/>
    <ellipse cx="1060" cy="440" rx="4" ry="4" fill="url(#drop3)" opacity="0.32"/>
    <ellipse cx="420"  cy="540" rx="4" ry="4" fill="url(#drop1)" opacity="0.3"/>
  </g>

  <!-- Crisp foreground ink specks -->
  <g fill="#a78bfa">
    <circle cx="280"  cy="140" r="1.5" opacity="0.6"/>
    <circle cx="620"  cy="80"  r="1"   opacity="0.55"/>
    <circle cx="980"  cy="160" r="1.5" opacity="0.55"/>
    <circle cx="360"  cy="360" r="1"   opacity="0.5"/>
    <circle cx="760"  cy="480" r="1.5" opacity="0.52"/>
    <circle cx="1200" cy="280" r="1"   opacity="0.48"/>
    <circle cx="560"  cy="720" r="1.5" opacity="0.48"/>
    <circle cx="1380" cy="520" r="1"   opacity="0.44"/>
  </g>
  <g fill="#f472b6">
    <circle cx="440"  cy="220" r="1.5" opacity="0.55"/>
    <circle cx="1020" cy="340" r="1"   opacity="0.5"/>
    <circle cx="200"  cy="500" r="1.5" opacity="0.48"/>
    <circle cx="920"  cy="740" r="1"   opacity="0.42"/>
    <circle cx="1300" cy="160" r="1.5" opacity="0.5"/>
  </g>

  <!-- Corner vignette glows -->
  <ellipse cx="0"    cy="0"   rx="180" ry="180" fill="url(#drop1)" opacity="0.1"/>
  <ellipse cx="1440" cy="900" rx="200" ry="200" fill="url(#drop2)" opacity="0.08"/>
</svg>
