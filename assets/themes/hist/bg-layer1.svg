<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#120a02"/>
      <stop offset="100%" stop-color="#080500"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <ellipse cx="400" cy="500" rx="500" ry="400" fill="url(#orb1)"/>
  <ellipse cx="1100" cy="200" rx="300" ry="250" fill="url(#orb2)"/>

  <!-- Ancient map contour lines -->
  <g stroke="#fb923c" stroke-width="0.6" opacity="0.07" fill="none">
    <path d="M0,200 Q200,180 400,220 Q600,260 800,200 Q1000,140 1200,190 Q1300,210 1440,180"/>
    <path d="M0,250 Q200,230 400,270 Q600,310 800,250 Q1000,190 1200,240 Q1300,260 1440,230"/>
    <path d="M0,300 Q200,280 400,320 Q600,360 800,300 Q1000,240 1200,290 Q1300,310 1440,280"/>
    <path d="M0,350 Q200,330 400,370 Q600,410 800,350 Q1000,290 1200,340 Q1300,360 1440,330"/>
    <path d="M0,500 Q300,480 500,520 Q700,560 900,500 Q1100,440 1300,490 Q1380,510 1440,480"/>
    <path d="M0,600 Q300,580 500,620 Q700,660 900,600 Q1100,540 1300,590 Q1380,610 1440,580"/>
    <path d="M0,700 Q300,680 500,720 Q700,760 900,700 Q1100,640 1300,690 Q1380,710 1440,680"/>
  </g>

  <!-- Pyramid silhouette -->
  <g fill="#fb923c" opacity="0.04">
    <polygon points="720,500 580,750 860,750"/>
    <polygon points="680,580 600,750 760,750"/>
  </g>

  <!-- Column outlines -->
  <g stroke="#fbbf24" stroke-width="0.8" opacity="0.06" fill="none">
    <rect x="100" y="550" width="24" height="180"/>
    <rect x="96" y="546" width="32" height="12"/>
    <rect x="96" y="726" width="32" height="12"/>
    <rect x="150" y="580" width="24" height="150"/>
    <rect x="146" y="576" width="32" height="12"/>
    <rect x="146" y="726" width="32" height="12"/>
    <rect x="200" y="560" width="24" height="170"/>
    <rect x="196" y="556" width="32" height="12"/>
    <rect x="196" y="726" width="32" height="12"/>
    <rect x="1200" y="560" width="24" height="170"/>
    <rect x="1196" y="556" width="32" height="12"/>
    <rect x="1196" y="726" width="32" height="12"/>
    <rect x="1250" y="580" width="24" height="150"/>
    <rect x="1246" y="576" width="32" height="12"/>
    <rect x="1246" y="726" width="32" height="12"/>
    <rect x="1300" y="550" width="24" height="180"/>
    <rect x="1296" y="546" width="32" height="12"/>
    <rect x="1296" y="726" width="32" height="12"/>
  </g>

  <!-- Scattered ancient glyphs -->
  <g font-family="serif" font-size="20" fill="#fb923c" opacity="0.06" transform="rotate(-5)">
    <text x="500" y="200">𓂀 𓆣 𓇌 𓉐 𓋴</text>
    <text x="800" y="650">𓌂 𓎛 𓏲 𓐍 𓑢</text>
  </g>

  <!-- Timeline dots -->
  <g fill="#fb923c" opacity="0.15">
    <circle cx="200" cy="850" r="3"/>
    <circle cx="400" cy="850" r="3"/>
    <circle cx="600" cy="850" r="3"/>
    <circle cx="800" cy="850" r="5"/>
    <circle cx="1000" cy="850" r="3"/>
    <circle cx="1200" cy="850" r="3"/>
    <line x1="200" y1="850" x2="1200" y2="850" stroke="#fb923c" stroke-width="0.5" opacity="0.2"/>
  </g>
</svg>
