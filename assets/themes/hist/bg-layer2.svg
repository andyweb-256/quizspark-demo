<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="none"/>

  <!-- Parchment vein cracks -->
  <g stroke="#fb923c" stroke-width="0.5" opacity="0.09" fill="none" stroke-linecap="round">
    <path d="M200,0 Q210,80 190,160 Q170,240 200,320 Q230,400 210,480"/>
    <path d="M190,160 Q160,180 120,170 Q80,160 60,190"/>
    <path d="M200,320 Q240,340 280,320 Q320,300 360,320"/>
    <path d="M800,900 Q820,820 800,740 Q780,660 810,580 Q840,500 820,420"/>
    <path d="M800,740 Q840,730 880,750 Q920,770 960,750"/>
    <path d="M810,580 Q770,560 730,580 Q690,600 650,580"/>
    <path d="M1300,0 Q1280,100 1300,200 Q1320,300 1300,400"/>
    <path d="M1300,200 Q1260,210 1220,200 Q1180,190 1160,210"/>
    <path d="M0,500 Q100,490 200,510 Q300,530 400,510 Q500,490 600,510"/>
    <path d="M300,510 Q310,560 290,610 Q270,660 300,710"/>
  </g>

  <!-- Compass rose -->
  <g transform="translate(1100, 650)" opacity="0.1" fill="none" stroke="#fbbf24" stroke-width="0.8">
    <circle r="90"/>
    <circle r="70" stroke-dasharray="4,8"/>
    <circle r="50"/>
    <line x1="0" y1="-90" x2="0" y2="90"/>
    <line x1="-90" y1="0" x2="90" y2="0"/>
    <line x1="-64" y1="-64" x2="64" y2="64" stroke-width="0.5"/>
    <line x1="64" y1="-64" x2="-64" y2="64" stroke-width="0.5"/>
    <polygon points="0,-90 -8,-60 0,-70 8,-60" fill="#fbbf24" opacity="0.4" stroke="none"/>
    <circle r="5" fill="#fbbf24" opacity="0.5" stroke="none"/>
    <text x="0" y="-96" font-family="serif" font-size="10" text-anchor="middle" fill="#fbbf24" stroke="none">N</text>
    <text x="0" y="106" font-family="serif" font-size="10" text-anchor="middle" fill="#fbbf24" stroke="none">S</text>
    <text x="96" y="4" font-family="serif" font-size="10" text-anchor="start" fill="#fbbf24" stroke="none">E</text>
    <text x="-96" y="4" font-family="serif" font-size="10" text-anchor="end" fill="#fbbf24" stroke="none">W</text>
  </g>

  <!-- Ancient coin circles -->
  <g fill="none" stroke="#fb923c" opacity="0.1">
    <circle cx="300"  cy="200" r="18" stroke-width="1"/>
    <circle cx="300"  cy="200" r="12" stroke-width="0.6"/>
    <circle cx="300"  cy="200" r="4"  stroke-width="0.5" fill="#fb923c" opacity="0.3"/>
    <circle cx="580"  cy="700" r="22" stroke-width="1"/>
    <circle cx="580"  cy="700" r="15" stroke-width="0.6"/>
    <circle cx="580"  cy="700" r="5"  stroke-width="0.5" fill="#fb923c" opacity="0.3"/>
    <circle cx="1020" cy="280" r="16" stroke-width="1"/>
    <circle cx="1020" cy="280" r="10" stroke-width="0.6"/>
    <circle cx="180"  cy="750" r="14" stroke-width="1"/>
    <circle cx="180"  cy="750" r="9"  stroke-width="0.6"/>
    <circle cx="760"  cy="160" r="20" stroke-width="1"/>
    <circle cx="760"  cy="160" r="13" stroke-width="0.6"/>
    <circle cx="1300" cy="550" r="17" stroke-width="1"/>
    <circle cx="1300" cy="550" r="11" stroke-width="0.6"/>
  </g>

  <!-- Soft amber glow nodes -->
  <ellipse cx="300"  cy="200" rx="50"  ry="50"  fill="url(#orb1)" opacity="0.5"/>
  <ellipse cx="1100" cy="650" rx="100" ry="100" fill="url(#orb2)" opacity="0.4"/>
  <ellipse cx="700"  cy="450" rx="70"  ry="70"  fill="url(#orb1)" opacity="0.3"/>

  <!-- Dust mote dots -->
  <g fill="#fb923c">
    <circle cx="420"  cy="130" r="1.5" opacity="0.35"/>
    <circle cx="680"  cy="280" r="1"   opacity="0.3"/>
    <circle cx="940"  cy="180" r="1.5" opacity="0.35"/>
    <circle cx="160"  cy="420" r="1"   opacity="0.3"/>
    <circle cx="860"  cy="560" r="1.5" opacity="0.35"/>
    <circle cx="1240" cy="380" r="1"   opacity="0.3"/>
    <circle cx="500"  cy="820" r="1.5" opacity="0.3"/>
    <circle cx="1140" cy="780" r="1"   opacity="0.28"/>
    <circle cx="340"  cy="620" r="1.5" opacity="0.32"/>
  </g>
  <g fill="#fbbf24">
    <circle cx="620"  cy="380" r="1.5" opacity="0.3"/>
    <circle cx="1060" cy="480" r="1"   opacity="0.28"/>
    <circle cx="220"  cy="560" r="1.5" opacity="0.3"/>
    <circle cx="1380" cy="280" r="1"   opacity="0.28"/>
  </g>

  <!-- Scroll decoration -->
  <g stroke="#fb923c" stroke-width="0.6" opacity="0.07" fill="none">
    <path d="M60,300 Q80,290 100,300 L380,300 Q400,290 420,300 Q400,310 380,310 L100,310 Q80,310 60,300Z"/>
    <line x1="80"  y1="300" x2="80"  y2="280"/>
    <line x1="400" y1="300" x2="400" y2="280"/>
    <path d="M80,280 Q90,270 100,280 L380,280 Q390,270 400,280"/>
  </g>
</svg>
