<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="pin1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pin2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60b8ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#60b8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="none"/>

  <!-- Lat/long grid overlay — curved to suggest globe projection -->
  <g stroke="#34d399" stroke-width="0.4" opacity="0.07" fill="none">
    <!-- Latitude curves -->
    <path d="M0,150 Q360,130 720,150 Q1080,170 1440,150"/>
    <path d="M0,250 Q360,225 720,250 Q1080,275 1440,250"/>
    <path d="M0,350 Q360,320 720,350 Q1080,380 1440,350"/>
    <path d="M0,450 Q360,415 720,450 Q1080,485 1440,450"/>
    <path d="M0,550 Q360,510 720,550 Q1080,590 1440,550"/>
    <path d="M0,650 Q360,605 720,650 Q1080,695 1440,650"/>
    <path d="M0,750 Q360,700 720,750 Q1080,800 1440,750"/>
    <!-- Longitude curves -->
    <path d="M180,0 Q160,225 180,450 Q200,675 180,900"/>
    <path d="M360,0 Q330,225 360,450 Q390,675 360,900"/>
    <path d="M540,0 Q505,225 540,450 Q575,675 540,900"/>
    <path d="M720,0 Q720,225 720,450 Q720,675 720,900"/>
    <path d="M900,0 Q935,225 900,450 Q865,675 900,900"/>
    <path d="M1080,0 Q1110,225 1080,450 Q1050,675 1080,900"/>
    <path d="M1260,0 Q1280,225 1260,450 Q1240,675 1260,900"/>
  </g>

  <!-- Flight path arcs -->
  <g stroke="#34d399" stroke-width="0.8" opacity="0.12" fill="none" stroke-dasharray="6,10">
    <path d="M120,600 Q400,200 780,300"/>
    <path d="M780,300 Q1060,380 1320,200"/>
    <path d="M200,750 Q600,400 1100,500"/>
    <path d="M80,200 Q500,500 900,650"/>
    <path d="M1400,700 Q1000,300 600,180"/>
  </g>

  <!-- Plane icons at arc midpoints -->
  <g fill="#34d399" opacity="0.18" font-family="sans-serif" font-size="12">
    <text x="448" y="248" transform="rotate(-25 448 248)">✈</text>
    <text x="1040" y="335" transform="rotate(-15 1040 335)">✈</text>
    <text x="630"  y="556" transform="rotate(-20 630 556)">✈</text>
  </g>

  <!-- Location pin glows -->
  <ellipse cx="120"  cy="600" rx="30" ry="30" fill="url(#pin1)" opacity="0.6"/>
  <ellipse cx="780"  cy="300" rx="35" ry="35" fill="url(#pin2)" opacity="0.55"/>
  <ellipse cx="1320" cy="200" rx="28" ry="28" fill="url(#pin1)" opacity="0.5"/>
  <ellipse cx="200"  cy="750" rx="25" ry="25" fill="url(#pin2)" opacity="0.5"/>
  <ellipse cx="1100" cy="500" rx="30" ry="30" fill="url(#pin1)" opacity="0.45"/>
  <ellipse cx="600"  cy="180" rx="28" ry="28" fill="url(#pin2)" opacity="0.5"/>

  <!-- Pin markers -->
  <g fill="none" stroke="#34d399" stroke-width="0.8" opacity="0.2">
    <circle cx="120"  cy="600" r="6"/>
    <circle cx="120"  cy="600" r="2" fill="#34d399" stroke="none"/>
    <circle cx="780"  cy="300" r="6"/>
    <circle cx="780"  cy="300" r="2" fill="#34d399" stroke="none"/>
    <circle cx="1320" cy="200" r="6"/>
    <circle cx="1320" cy="200" r="2" fill="#34d399" stroke="none"/>
    <circle cx="200"  cy="750" r="6"/>
    <circle cx="200"  cy="750" r="2" fill="#34d399" stroke="none"/>
    <circle cx="1100" cy="500" r="6"/>
    <circle cx="1100" cy="500" r="2" fill="#34d399" stroke="none"/>
    <circle cx="600"  cy="180" r="6"/>
    <circle cx="600"  cy="180" r="2" fill="#34d399" stroke="none"/>
  </g>

  <!-- Coordinate label fragments -->
  <g font-family="monospace" font-size="9" fill="#34d399" opacity="0.1">
    <text x="126"  y="616">0°N 32°E</text>
    <text x="786"  y="316">1°S 37°E</text>
    <text x="1326" y="216">40°N 9°E</text>
    <text x="206"  y="766">6°S 35°E</text>
    <text x="1106" y="516">48°N 2°E</text>
  </g>

  <!-- Scattered terrain dots -->
  <g fill="#34d399">
    <circle cx="340"  cy="180" r="1.5" opacity="0.3"/>
    <circle cx="560"  cy="420" r="1"   opacity="0.28"/>
    <circle cx="900"  cy="160" r="1.5" opacity="0.3"/>
    <circle cx="440"  cy="680" r="1"   opacity="0.28"/>
    <circle cx="1200" cy="700" r="1.5" opacity="0.3"/>
    <circle cx="700"  cy="820" r="1"   opacity="0.25"/>
    <circle cx="980"  cy="760" r="1.5" opacity="0.28"/>
    <circle cx="260"  cy="360" r="1"   opacity="0.28"/>
    <circle cx="1380" cy="480" r="1.5" opacity="0.28"/>
  </g>
</svg>
