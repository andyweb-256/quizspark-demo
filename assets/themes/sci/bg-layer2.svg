  <g font-family="monospace" font-size="10" fill="#60b8ff" opacity="0.06">
    <text x="80"   y="80">01001000</text>
    <text x="900"  y="120">11010110</text>
    <text x="400"  y="820">00110101</text>
    <text x="1200" y="820">10110010</text>
    <text x="60"   y="460">11001001</text>
