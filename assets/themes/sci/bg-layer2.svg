    <path d="M1100,180 L1200,180 L1220,200 L1440,200"/>
    <path d="M400,500 L550,500 L570,520 L800,520 L820,500 L1100,500"/>
    <path d="M0,680 L250,680 L270,660 L550,660 L570,680 L900,680"/>
    <path d="M1100,500 L1250,500 L1270,520 L1440,520"/>
    <path d="M900,680 L1100,680 L1120,700 L1440,700"/>
    <path d="M320,0 L320,180"/>
    <path d="M600,160 L600,0"/>
    <path d="M200,340 L200,500"/>
    <path d="M800,340 L800,520"/>
    <path d="M1100,180 L1100,500"/>
    <path d="M400,500 L400,680"/>
    <path d="M900,680 L900,900"/>
    <path d="M550,660 L550,900"/>
    <circle cx="320" cy="180" r="3" fill="#60b8ff" opacity="0.5"/>
