  <ellipse cx="1050" cy="620" rx="50" ry="50" fill="url(#node2)" opacity="0.4"/>

  <!-- Small bright dots -->
  <g fill="#60b8ff">
    <circle cx="140"  cy="280" r="2"   opacity="0.5"/>
    <circle cx="380"  cy="140" r="1.5" opacity="0.4"/>
    <circle cx="620"  cy="380" r="2.5" opacity="0.55"/>
    <circle cx="860"  cy="240" r="2"   opacity="0.45"/>
    <circle cx="1020" cy="440" r="2"   opacity="0.5"/>
