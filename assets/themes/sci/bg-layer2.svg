  </g>

  <!-- Micro chip pads -->
  <g fill="none" stroke="#60b8ff" stroke-width="0.5" opacity="0.1">
    <rect x="580" y="300" width="40" height="28" rx="2"/>
    <rect x="586" y="290" width="4" height="10"/>
    <rect x="594" y="290" width="4" height="10"/>
    <rect x="602" y="290" width="4" height="10"/>
    <rect x="610" y="290" width="4" height="10"/>
    <rect x="586" y="328" width="4" height="10"/>
    <rect x="594" y="328" width="4" height="10"/>
    <rect x="602" y="328" width="4" height="10"/>
    <rect x="610" y="328" width="4" height="10"/>
    <rect x="1000" y="160" width="36" height="24" rx="2"/>
    <rect x="1006" y="150" width="4" height="10"/>
    <rect x="1014" y="150" width="4" height="10"/>
    <rect x="1022" y="150" width="4" height="10"/>
    <rect x="1006" y="184" width="4" height="10"/>
    <rect x="1014" y="184" width="4" height="10"/>
