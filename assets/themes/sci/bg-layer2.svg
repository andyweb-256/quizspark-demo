    <circle cx="200" cy="340" r="3" fill="#60b8ff" opacity="0.5"/>
    <circle cx="800" cy="340" r="3" fill="#60b8ff" opacity="0.5"/>
    <circle cx="1100" cy="180" r="3" fill="#60b8ff" opacity="0.5"/>
    <circle cx="400" cy="500" r="3" fill="#60b8ff" opacity="0.5"/>
    <circle cx="1100" cy="500" r="3" fill="#60b8ff" opacity="0.5"/>
    <circle cx="900" cy="680" r="3" fill="#60b8ff" opacity="0.5"/>
    <circle cx="550" cy="660" r="3" fill="#60b8ff" opacity="0.5"/>
