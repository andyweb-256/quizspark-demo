    <path d="M190,117 L220,134 L220,167 L190,184 L160,167 L160,134 Z"/>
    <path d="M250,117 L280,134 L280,167 L250,184 L220,167 L220,134 Z"/>
    <path d="M310,117 L340,134 L340,167 L310,184 L280,167 L280,134 Z"/>
    <path d="M100,184 L130,201 L130,234 L100,251 L70,234 L70,201 Z"/>
    <path d="M160,184 L190,201 L190,234 L160,251 L130,234 L130,201 Z"/>
    <path d="M220,184 L250,201 L250,234 L220,251 L190,234 L190,201 Z"/>
    <path d="M900,400 L930,417 L930,450 L900,467 L870,450 L870,417 Z"/>
    <path d="M960,400 L990,417 L990,450 L960,467 L930,450 L930,417 Z"/>
    <path d="M1020,400 L1050,417 L1050,450 L1020,467 L990,450 L990,417 Z"/>
    <path d="M1080,400 L1110,417 L1110,450 L1080,467 L1050,450 L1050,417 Z"/>
    <path d="M930,467 L960,484 L960,517 L930,534 L900,517 L900,484 Z"/>
    <path d="M990,467 L1020,484 L1020,517 L990,534 L960,517 L960,484 Z"/>
    <path d="M1050,467 L1080,484 L1080,517 L1050,534 L1020,517 L1020,484 Z"/>
  </g>

  <!-- Atom orbits -->
  <g fill="none" stroke="#60b8ff" opacity="0.12">
    <ellipse cx="1100" cy="200" rx="120" ry="50" stroke-width="1" transform="rotate(-30 1100 200)"/>
    <ellipse cx="1100" cy="200" rx="120" ry="50" stroke-width="1" transform="rotate(30 1100 200)"/>
    <ellipse cx="1100" cy="200" rx="120" ry="50" stroke-width="1" transform="rotate(90 1100 200)"/>
    <circle cx="1100" cy="200" r="10" fill="#60b8ff" opacity="0.4"/>
    <circle cx="1220" cy="200" r="4" fill="#60b8ff" opacity="0.6"/>
    <circle cx="1040" cy="148" r="4" fill="#60b8ff" opacity="0.6"/>
    <circle cx="1040" cy="252" r="4" fill="#a78bfa" opacity="0.6"/>
  </g>

  <!-- DNA helix suggestion -->
  <g stroke="#34d399" stroke-width="1.5" opacity="0.08" fill="none">
    <path d="M50,400 Q80,350 110,400 Q140,450 170,400 Q200,350 230,400 Q260,450 290,400 Q320,350 350,400"/>
    <path d="M50,440 Q80,490 110,440 Q140,390 170,440 Q200,490 230,440 Q260,390 290,440 Q320,490 350,440"/>
    <line x1="80" y1="363" x2="80" y2="477" stroke-width="0.8" opacity="0.6"/>
    <line x1="140" y1="437" x2="140" y2="403" stroke-width="0.8" opacity="0.6"/>
    <line x1="200" y1="363" x2="200" y2="477" stroke-width="0.8" opacity="0.6"/>
    <line x1="260" y1="437" x2="260" y2="403" stroke-width="0.8" opacity="0.6"/>
    <line x1="320" y1="363" x2="320" y2="477" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Floating formula fragments -->
  <g font-family="monospace" font-size="13" fill="#60b8ff" opacity="0.07">
    <text x="600" y="100">E = mc²</text>
    <text x="800" y="300">∇ × B = μ₀J</text>
    <text x="200" y="700">H₂O</text>
    <text x="1200" y="500">∫f(x)dx</text>
    <text x="700" y="800">λ = h/mv</text>
    <text x="400" y="500">F = ma</text>
  </g>
</svg>
