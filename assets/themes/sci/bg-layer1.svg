<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="30%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#020818"/>
      <stop offset="100%" stop-color="#000510"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60b8ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#60b8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Ambient light orbs -->
  <ellipse cx="300" cy="300" rx="400" ry="350" fill="url(#orb1)"/>
  <ellipse cx="1100" cy="600" rx="350" ry="300" fill="url(#orb2)"/>

