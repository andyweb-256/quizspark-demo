<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0b0b12"/>
      <stop offset="100%" stop-color="#06060e"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60b8ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#60b8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <ellipse cx="500" cy="300" rx="400" ry="350" fill="url(#orb1)"/>
  <ellipse cx="1100" cy="600" rx="350" ry="300" fill="url(#orb2)"/>

  <!-- Large typographic letterforms (barely visible) -->
  <g font-family="Georgia, serif" font-weight="700" fill="#94a3b8" opacity="0.04">
    <text x="0" y="400" font-size="500">A</text>
    <text x="900" y="900" font-size="400">Z</text>
  </g>

  <!-- Scattered world script characters -->
  <g font-family="serif" fill="#94a3b8" opacity="0.07">
    <!-- Arabic -->
    <text x="150" y="200" font-size="28">مرحبا</text>
    <!-- Chinese -->
    <text x="400" y="350" font-size="28">知识</text>
    <!-- Hindi -->
    <text x="700" y="180" font-size="24">ज्ञान</text>
    <!-- Greek -->
    <text x="1000" y="300" font-size="28">λόγος</text>
    <!-- Japanese -->
    <text x="1250" y="450" font-size="24">言葉</text>
    <!-- Amharic -->
    <text x="200" y="600" font-size="24">ቋንቋ</text>
    <!-- Russian -->
    <text x="600" y="700" font-size="24">слово</text>
    <!-- Korean -->
    <text x="900" y="650" font-size="24">언어</text>
    <!-- Swahili -->
    <text x="1150" y="750" font-size="20">lugha</text>
  </g>

  <!-- Baseline grid (ruled paper feel) -->
  <g stroke="#94a3b8" stroke-width="0.4" opacity="0.04">
    <line x1="0" y1="120" x2="1440" y2="120"/>
    <line x1="0" y1="160" x2="1440" y2="160"/>
    <line x1="0" y1="200" x2="1440" y2="200"/>
    <line x1="0" y1="240" x2="1440" y2="240"/>
    <line x1="0" y1="400" x2="1440" y2="400"/>
    <line x1="0" y1="440" x2="1440" y2="440"/>
    <line x1="0" y1="480" x2="1440" y2="480"/>
    <line x1="0" y1="520" x2="1440" y2="520"/>
    <line x1="0" y1="680" x2="1440" y2="680"/>
    <line x1="0" y1="720" x2="1440" y2="720"/>
    <line x1="0" y1="760" x2="1440" y2="760"/>
    <line x1="0" y1="800" x2="1440" y2="800"/>
  </g>

  <!-- Speech bubble outlines -->
  <g stroke="#94a3b8" stroke-width="1" opacity="0.07" fill="none">
    <rect x="800" y="100" width="200" height="80" rx="12"/>
    <path d="M830,180 L820,210 L860,180Z"/>
    <rect x="400" y="500" width="240" height="70" rx="12"/>
    <path d="M620,570 L640,600 L600,570Z"/>
  </g>

  <!-- Quotation marks (large, decorative) -->
  <g font-family="Georgia, serif" font-size="120" fill="#94a3b8" opacity="0.05">
    <text x="40" y="300">"</text>
    <text x="1300" y="700">"</text>
  </g>

  <!-- Morse code dots and dashes -->
  <g fill="#94a3b8" opacity="0.08">
    <circle cx="100" cy="850" r="3"/>
    <rect x="112" y="847" width="12" height="6" rx="3"/>
    <circle cx="132" cy="850" r="3"/>
    <circle cx="142" cy="850" r="3"/>
    <rect x="154" y="847" width="12" height="6" rx="3"/>
    <circle cx="174" cy="850" r="3"/>
    <rect x="184" y="847" width="12" height="6" rx="3"/>
    <rect x="204" y="847" width="12" height="6" rx="3"/>
  </g>
</svg>
