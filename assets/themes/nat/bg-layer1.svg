<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="40%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#020e04"/>
      <stop offset="100%" stop-color="#010801"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <ellipse cx="1100" cy="700" rx="400" ry="300" fill="url(#orb1)"/>
  <ellipse cx="300" cy="200" rx="350" ry="300" fill="url(#orb2)"/>

  <!-- Root/branch network -->
  <g stroke="#4ade80" stroke-width="0.8" opacity="0.07" fill="none" stroke-linecap="round">
    <path d="M720,900 Q720,800 680,720 Q640,640 600,560 Q560,480 520,400"/>
    <path d="M720,900 Q720,800 760,720 Q800,640 840,560 Q880,480 920,400"/>
    <path d="M680,720 Q640,700 580,710 Q520,720 460,700"/>
    <path d="M760,720 Q800,700 860,710 Q920,720 980,700"/>
    <path d="M600,560 Q560,540 500,550 Q440,560 380,540"/>
    <path d="M840,560 Q880,540 940,550 Q1000,560 1060,540"/>
    <path d="M520,400 Q480,380 420,390 Q360,400 300,380"/>
    <path d="M920,400 Q960,380 1020,390 Q1080,400 1140,380"/>
    <path d="M300,380 Q280,350 260,300 Q240,250 200,220"/>
    <path d="M1140,380 Q1160,350 1180,300 Q1200,250 1240,220"/>
  </g>

  <!-- Leaf shapes -->
  <g fill="#4ade80" opacity="0.05">
    <ellipse cx="200" cy="200" rx="60" ry="30" transform="rotate(-30 200 200)"/>
    <ellipse cx="280" cy="160" rx="50" ry="25" transform="rotate(20 280 160)"/>
    <ellipse cx="1200" cy="300" rx="60" ry="30" transform="rotate(40 1200 300)"/>
    <ellipse cx="1140" cy="250" rx="50" ry="25" transform="rotate(-20 1140 250)"/>
    <ellipse cx="100" cy="600" rx="55" ry="28" transform="rotate(15 100 600)"/>
    <ellipse cx="1350" cy="650" rx="55" ry="28" transform="rotate(-25 1350 650)"/>
  </g>

  <!-- Bioluminescent particle dots -->
  <g fill="#4ade80" opacity="0.18">
    <circle cx="400" cy="350" r="2"/>
    <circle cx="500" cy="280" r="1.5"/>
    <circle cx="650" cy="400" r="2.5"/>
    <circle cx="750" cy="320" r="1.5"/>
    <circle cx="350" cy="500" r="2"/>
    <circle cx="1000" cy="280" r="2"/>
    <circle cx="1100" cy="400" r="1.5"/>
    <circle cx="1200" cy="350" r="2.5"/>
    <circle cx="950" cy="500" r="2"/>
  </g>
  <g fill="#f97316" opacity="0.12">
    <circle cx="1100" cy="600" r="2"/>
    <circle cx="1200" cy="680" r="2.5"/>
    <circle cx="1300" cy="620" r="1.5"/>
    <circle cx="1050" cy="720" r="2"/>
    <circle cx="1250" cy="750" r="1.5"/>
  </g>

  <!-- Spiral fern -->
  <g stroke="#4ade80" stroke-width="0.8" opacity="0.07" fill="none">
    <path d="M100,800 Q120,750 150,720 Q180,690 200,650 Q220,610 210,570 Q200,530 180,510 Q160,490 140,500 Q120,510 130,540 Q140,570 160,570 Q180,570 190,550"/>
  </g>

  <!-- Wavy water/flow lines at bottom -->
  <g stroke="#f97316" stroke-width="0.6" opacity="0.05" fill="none">
    <path d="M0,820 Q180,800 360,820 Q540,840 720,820 Q900,800 1080,820 Q1260,840 1440,820"/>
    <path d="M0,840 Q180,820 360,840 Q540,860 720,840 Q900,820 1080,840 Q1260,860 1440,840"/>
    <path d="M0,860 Q180,840 360,860 Q540,880 720,860 Q900,840 1080,860 Q1260,880 1440,860"/>
  </g>
</svg>
