<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="spore1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spore2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spore3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="none"/>

  <!-- Mushroom silhouette — bottom right foreground -->
  <g transform="translate(1320, 900)" opacity="0.08" fill="#4ade80" stroke="none">
    <!-- Cap -->
    <path d="M-100,0 Q-120,-80 -80,-140 Q-40,-180 0,-185 Q40,-180 80,-140 Q120,-80 100,0 Z"/>
    <!-- Gills suggestion -->
    <path d="M-100,0 Q-60,-20 0,-20 Q60,-20 100,0" fill="none" stroke="#4ade80" stroke-width="0.6" opacity="0.5"/>
    <!-- Stem -->
    <rect x="-20" y="0" width="40" height="80" rx="8"/>
    <!-- Spots on cap -->
    <circle cx="-40" cy="-100" r="10" fill="none" stroke="#4ade80" stroke-width="0.8" opacity="0.4"/>
    <circle cx="20"  cy="-130" r="8"  fill="none" stroke="#4ade80" stroke-width="0.8" opacity="0.4"/>
    <circle cx="-10" cy="-80"  r="6"  fill="none" stroke="#4ade80" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Floating upward spore trails -->
  <g stroke="#4ade80" stroke-width="0.4" opacity="0.07" fill="none" stroke-linecap="round">
    <path d="M200,900 Q195,820 205,740 Q215,660 208,580"/>
    <path d="M380,900 Q372,830 385,755 Q398,680 390,600"/>
    <path d="M560,900 Q552,840 565,768 Q578,696 570,618"/>
    <path d="M740,900 Q733,845 746,773 Q759,701 752,628"/>
    <path d="M920,900 Q913,845 924,775 Q935,705 928,635"/>
    <path d="M1100,900 Q1094,848 1104,778 Q1114,708 1107,635"/>
  </g>

  <!-- Bright bioluminescent glow spores -->
  <g filter="url(#glow)">
    <ellipse cx="340"  cy="200" rx="5" ry="5" fill="url(#spore1)" opacity="0.42"/>
    <ellipse cx="700"  cy="360" rx="6" ry="6" fill="url(#spore2)" opacity="0.38"/>
    <ellipse cx="180"  cy="520" rx="4" ry="4" fill="url(#spore3)" opacity="0.36"/>
    <ellipse cx="960"  cy="280" rx="5" ry="5" fill="url(#spore1)" opacity="0.38"/>
    <ellipse cx="580"  cy="640" rx="5" ry="5" fill="url(#spore2)" opacity="0.35"/>
    <ellipse cx="1200" cy="480" rx="4" ry="4" fill="url(#spore3)" opacity="0.34"/>
    <ellipse cx="440"  cy="780" rx="4" ry="4" fill="url(#spore1)" opacity="0.32"/>
    <ellipse cx="1060" cy="720" rx="5" ry="5" fill="url(#spore2)" opacity="0.32"/>
  </g>

  <!-- Floating spore blobs — soft blur -->
  <g filter="url(#softblur)" opacity="0.1">
    <circle cx="260"  cy="300" r="4" fill="#4ade80"/>
    <circle cx="820"  cy="200" r="5" fill="#4ade80"/>
    <circle cx="1140" cy="380" r="4" fill="#f97316"/>
    <circle cx="480"  cy="460" r="3" fill="#4ade80"/>
    <circle cx="880"  cy="600" r="4" fill="#fbbf24"/>
    <circle cx="300"  cy="680" r="3" fill="#4ade80"/>
    <circle cx="1300" cy="620" r="4" fill="#f97316"/>
  </g>

  <!-- Crisp foreground bright specks -->
  <g fill="#4ade80">
    <circle cx="160"  cy="140" r="1.5" opacity="0.6"/>
    <circle cx="500"  cy="100" r="1"   opacity="0.55"/>
    <circle cx="860"  cy="140" r="1.5" opacity="0.55"/>
    <circle cx="280"  cy="380" r="1"   opacity="0.5"/>
    <circle cx="660"  cy="500" r="1.5" opacity="0.52"/>
    <circle cx="1100" cy="240" r="1"   opacity="0.48"/>
    <circle cx="500"  cy="720" r="1.5" opacity="0.48"/>
    <circle cx="1360" cy="400" r="1"   opacity="0.44"/>
  </g>
  <g fill="#f97316">
    <circle cx="420"  cy="240" r="1.5" opacity="0.5"/>
    <circle cx="980"  cy="420" r="1"   opacity="0.45"/>
    <circle cx="220"  cy="600" r="1.5" opacity="0.46"/>
    <circle cx="1020" cy="800" r="1"   opacity="0.4"/>
    <circle cx="1260" cy="160" r="1.5" opacity="0.48"/>
  </g>
  <g fill="#fbbf24">
    <circle cx="640"  cy="320" r="1.5" opacity="0.45"/>
    <circle cx="1180" cy="660" r="1"   opacity="0.4"/>
    <circle cx="360"  cy="840" r="1"   opacity="0.38"/>
  </g>

  <!-- Corner vignette glows -->
  <ellipse cx="0"    cy="0"   rx="180" ry="180" fill="url(#spore1)" opacity="0.1"/>
  <ellipse cx="1440" cy="900" rx="220" ry="220" fill="url(#spore2)" opacity="0.09"/>
</svg>
