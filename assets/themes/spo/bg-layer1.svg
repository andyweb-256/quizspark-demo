<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="70%" r="80%">
      <stop offset="0%" stop-color="#020812"/>
      <stop offset="100%" stop-color="#000508"/>
    </radialGradient>
    <radialGradient id="light1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#378ADD" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#378ADD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60b8ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#60b8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <ellipse cx="400" cy="100" rx="300" ry="250" fill="url(#light1)"/>
  <ellipse cx="1050" cy="100" rx="300" ry="250" fill="url(#light2)"/>
  <ellipse cx="720" cy="900" rx="500" ry="200" fill="url(#light3)"/>

  <!-- Stadium floodlight beams -->
  <g opacity="0.07">
    <polygon points="200,0 100,900 300,900" fill="#378ADD"/>
    <polygon points="400,0 350,900 450,900" fill="#378ADD"/>
    <polygon points="1050,0 1000,900 1100,900" fill="#60b8ff"/>
    <polygon points="1250,0 1150,900 1350,900" fill="#60b8ff"/>
  </g>

  <!-- Football pitch markings -->
  <g stroke="#378ADD" stroke-width="0.8" opacity="0.09" fill="none">
    <!-- Outer boundary -->
    <rect x="180" y="200" width="1080" height="600"/>
    <!-- Center line -->
    <line x1="720" y1="200" x2="720" y2="800"/>
    <!-- Center circle -->
    <circle cx="720" cy="500" r="90"/>
    <circle cx="720" cy="500" r="4" fill="#378ADD" opacity="0.3"/>
    <!-- Left penalty box -->
    <rect x="180" y="330" width="165" height="340"/>
    <rect x="180" y="390" width="65" height="220"/>
    <!-- Right penalty box -->
    <rect x="1095" y="330" width="165" height="340"/>
    <rect x="1175" y="390" width="65" height="220"/>
    <!-- Corner arcs -->
    <path d="M180,200 Q200,200 200,220"/>
    <path d="M1260,200 Q1260,200 1240,220"/>
    <path d="M180,800 Q200,800 200,780"/>
    <path d="M1260,800 Q1260,800 1240,780"/>
    <!-- Center spot -->
    <circle cx="720" cy="500" r="3" fill="#378ADD" opacity="0.4"/>
    <!-- Penalty spots -->
    <circle cx="335" cy="500" r="3" fill="#378ADD" opacity="0.4"/>
    <circle cx="1105" cy="500" r="3" fill="#378ADD" opacity="0.4"/>
  </g>

  <!-- Speed/motion lines -->
  <g stroke="#378ADD" stroke-width="1" opacity="0.06">
    <line x1="0" y1="100" x2="400" y2="140"/>
    <line x1="0" y1="120" x2="350" y2="155"/>
    <line x1="0" y1="140" x2="300" y2="170"/>
    <line x1="1440" y1="750" x2="1040" y2="710"/>
    <line x1="1440" y1="770" x2="1090" y2="725"/>
    <line x1="1440" y1="790" x2="1140" y2="740"/>
  </g>

  <!-- Score/stat boxes suggestion -->
  <g stroke="#378ADD" stroke-width="0.5" opacity="0.08" fill="none">
    <rect x="50" y="820" width="160" height="50" rx="4"/>
    <rect x="1230" y="820" width="160" height="50" rx="4"/>
  </g>
</svg>
