<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05050f"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60b8ff"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e0e8ff"/>
      <stop offset="100%" stop-color="#60b8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="200" cy="150" r="200" fill="#60b8ff" opacity="0.05"/>
  <circle cx="1000" cy="480" r="250" fill="#f472b6" opacity="0.06"/>
  <circle cx="600" cy="600" r="180" fill="#fb923c" opacity="0.04"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Lightning bolt icon -->
  <g filter="url(#glow)" transform="translate(88, 180)">
    <polygon points="52,0 12,72 38,72 34,120 74,48 48,48" fill="url(#spark)" opacity="0.95"/>
  </g>

  <!-- QuizSpark wordmark -->
  <text x="176" y="268" font-family="Georgia, serif" font-size="88" font-weight="700" fill="url(#title)" letter-spacing="-2">Quiz</text>
  <text x="416" y="268" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#60b8ff" letter-spacing="-2" filter="url(#glow)">Spark</text>

  <!-- Tagline -->
  <text x="88" y="320" font-family="Georgia, serif" font-size="26" fill="#8899bb" letter-spacing="1">Eight categories. Four tiers. How far can you go?</text>

  <!-- Niche pills -->
  <g font-family="monospace" font-size="16" font-weight="600" letter-spacing="1">
    <!-- sci -->
    <rect x="88" y="370" width="130" height="34" rx="17" fill="#60b8ff" opacity="0.15"/>
    <rect x="88" y="370" width="130" height="34" rx="17" fill="none" stroke="#60b8ff" stroke-width="1" opacity="0.4"/>
    <text x="153" y="393" fill="#60b8ff" text-anchor="middle">⚗️ SCIENCE</text>
    <!-- hist -->
    <rect x="230" y="370" width="110" height="34" rx="17" fill="#fb923c" opacity="0.15"/>
    <rect x="230" y="370" width="110" height="34" rx="17" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.4"/>
    <text x="285" y="393" fill="#fb923c" text-anchor="middle">📜 HISTORY</text>
    <!-- geo -->
    <rect x="352" y="370" width="120" height="34" rx="17" fill="#34d399" opacity="0.15"/>
    <rect x="352" y="370" width="120" height="34" rx="17" fill="none" stroke="#34d399" stroke-width="1" opacity="0.4"/>
    <text x="412" y="393" fill="#34d399" text-anchor="middle">🌍 GEOGRAPHY</text>
    <!-- pop -->
    <rect x="484" y="370" width="120" height="34" rx="17" fill="#f472b6" opacity="0.15"/>
    <rect x="484" y="370" width="120" height="34" rx="17" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.4"/>
    <text x="544" y="393" fill="#f472b6" text-anchor="middle">🎬 POP CULTURE</text>
    <!-- spo -->
    <rect x="88" y="416" width="100" height="34" rx="17" fill="#378ADD" opacity="0.15"/>
    <rect x="88" y="416" width="100" height="34" rx="17" fill="none" stroke="#378ADD" stroke-width="1" opacity="0.4"/>
    <text x="138" y="439" fill="#378ADD" text-anchor="middle">⚽ SPORTS</text>
    <!-- art -->
    <rect x="200" y="416" width="120" height="34" rx="17" fill="#a78bfa" opacity="0.15"/>
    <rect x="200" y="416" width="120" height="34" rx="17" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
    <text x="260" y="439" fill="#a78bfa" text-anchor="middle">🎭 ARTS & LIT</text>
    <!-- nat -->
    <rect x="332" y="416" width="110" height="34" rx="17" fill="#f97316" opacity="0.15"/>
    <rect x="332" y="416" width="110" height="34" rx="17" fill="none" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <text x="387" y="439" fill="#f97316" text-anchor="middle">🌿 NATURE</text>
    <!-- lang -->
    <rect x="454" y="416" width="120" height="34" rx="17" fill="#94a3b8" opacity="0.15"/>
    <rect x="454" y="416" width="120" height="34" rx="17" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
    <text x="514" y="439" fill="#94a3b8" text-anchor="middle">💬 LANGUAGE</text>
  </g>

  <!-- Right side decorative score card -->
  <g transform="translate(780, 160)">
    <rect width="340" height="280" rx="16" fill="#ffffff" opacity="0.03"/>
    <rect width="340" height="280" rx="16" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
    <text x="170" y="44" font-family="monospace" font-size="11" fill="#8899bb" text-anchor="middle" letter-spacing="2">TODAY'S DAILY QUIZ</text>
    <line x1="30" y1="58" x2="310" y2="58" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    <text x="170" y="110" font-family="Georgia, serif" font-size="64" fill="#ffffff" text-anchor="middle" opacity="0.9">8/10</text>
    <text x="170" y="140" font-family="monospace" font-size="13" fill="#60b8ff" text-anchor="middle" letter-spacing="1">VETERAN RANK</text>
    <rect x="30" y="160" width="280" height="6" rx="3" fill="#ffffff" opacity="0.08"/>
    <rect x="30" y="160" width="224" height="6" rx="3" fill="url(#spark)" opacity="0.8"/>
    <text x="30" y="198" font-family="monospace" font-size="12" fill="#8899bb" letter-spacing="1">STREAK</text>
    <text x="310" y="198" font-family="monospace" font-size="12" fill="#fb923c" text-anchor="end" letter-spacing="1">🔥 7 DAYS</text>
    <text x="30" y="230" font-family="monospace" font-size="12" fill="#8899bb" letter-spacing="1">RANK</text>
    <text x="310" y="230" font-family="monospace" font-size="12" fill="#34d399" text-anchor="end" letter-spacing="1">#142 GLOBAL</text>
    <text x="30" y="262" font-family="monospace" font-size="12" fill="#8899bb" letter-spacing="1">TIME</text>
    <text x="310" y="262" font-family="monospace" font-size="12" fill="#ffffff" text-anchor="end" opacity="0.6" letter-spacing="1">1:43</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#ffffff" opacity="0.02"/>
  <text x="600" y="614" font-family="monospace" font-size="13" fill="#8899bb" text-anchor="middle" letter-spacing="3">QUIZSPARK.COM · TEST YOUR KNOWLEDGE DAILY</text>
</svg>
